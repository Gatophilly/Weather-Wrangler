<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Weather Wrangler</title>

<style>
:root{
  --bg:#000;--bg2:#0a0a0a;--bg3:#141414;--bg4:#1e1e1e;--bg5:#282828;
  --amber:#ff9f0a;--amber2:rgba(255,159,10,0.12);--amber3:rgba(255,159,10,0.06);
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.04);
  --text:#fff;--text2:rgba(255,255,255,0.6);--text3:rgba(255,255,255,0.3);
  --green:#30d158;--blue:#0a84ff;--red:#ff453a;--purple:#bf5af2;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --radius:16px;--radius-sm:10px;--radius-xs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;background:#000}
body{font-family:'DM Sans',sans-serif;color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.topo-bg{position:fixed;inset:0;z-index:0;opacity:0.18;pointer-events:none;overflow:hidden}
.topo-bg svg{width:100%;height:100%}
.app{min-height:100vh;min-height:-webkit-fill-available;position:relative;z-index:1;padding-bottom:calc(72px + var(--safe-bottom))}
.hdr{background:rgba(0,0,0,0.85);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-bottom:1px solid var(--border);padding:10px 16px;padding-top:calc(10px + var(--safe-top));position:sticky;top:0;z-index:200}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{width:38px;height:38px;object-fit:contain;border-radius:9px}
.logo-name{font-size:17px;font-weight:700;letter-spacing:-0.3px;color:#fff}
.logo-sub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;margin-top:1px}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(48,209,88,0.12);border:1px solid rgba(48,209,88,0.2);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--green);font-family:'DM Mono',monospace}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:300;background:rgba(0,0,0,0.9);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom)}
.nav-inner{display:flex;padding:6px 0 2px}
.nav-btn{flex:1;padding:6px 2px 4px;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:0.2px}
.nav-btn.active{color:var(--amber)}
.nav-icon{font-size:20px;line-height:1}
.content{padding:12px 16px;max-width:600px;margin:0 auto}
.card{background:var(--bg3);border-radius:var(--radius);padding:16px;margin-bottom:10px;border:1px solid var(--border);position:relative;overflow:hidden}
.card-label{font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;font-family:'DM Mono',monospace}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat-card{background:var(--bg3);border-radius:var(--radius);padding:14px 14px 12px;border:1px solid var(--border)}
.stat-icon{font-size:22px;margin-bottom:6px}
.stat-val{font-size:20px;font-weight:700;letter-spacing:-0.5px;color:#fff;line-height:1}
.stat-name{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500;font-family:'DM Mono',monospace;letter-spacing:0.5px}
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-inner{position:absolute;text-align:center}
.ring-num{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1}
.ring-lbl{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;margin-top:1px}
.gauge-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.gauge-lbl{font-size:12px;font-weight:500;width:88px;color:var(--text2);font-family:'DM Mono',monospace}
.gauge-track{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.gauge-fill{height:100%;border-radius:2px}
.gauge-val{font-family:'DM Mono',monospace;font-size:11px;width:28px;text-align:right;color:var(--text2)}
.verdict{display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600}
.fc-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2)}
.fc-row:last-child{border-bottom:none}
.hscroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.hcard{min-width:54px;background:var(--bg4);border-radius:var(--radius-sm);padding:10px 6px;text-align:center;flex-shrink:0;border:1px solid var(--border2)}
.map-wrap{border-radius:var(--radius-sm);overflow:hidden;position:relative;background:#050800;border:1px solid var(--border)}
.radar-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;opacity:0.6}
.map-hud{position:absolute;top:10px;right:10px;z-index:10}
.hud-pill{background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);border:1px solid rgba(255,159,10,0.3);border-radius:20px;padding:4px 10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--amber);display:flex;align-items:center;gap:5px}
.map-legend{position:absolute;bottom:10px;left:10px;z-index:10;display:flex;gap:6px}
.legend-item{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,0.75);border-radius:6px;padding:3px 8px;border:1px solid var(--border)}
.legend-dot{width:7px;height:7px;border-radius:50%}
.legend-txt{color:var(--text3);font-size:10px;font-family:'DM Mono',monospace}
.srch-outer{display:flex;gap:8px;margin-bottom:12px}
.srch-inner{position:relative;flex:1}
.srch-in{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;-webkit-appearance:none}
.srch-in::placeholder{color:var(--text3)}
.srch-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text2);cursor:pointer;font-size:15px;-webkit-appearance:none}
.ac-box{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg4);border:1px solid var(--border);border-radius:var(--radius-sm);z-index:9999;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.8);display:none}
.ac-item{padding:13px 14px;cursor:pointer;font-size:14px;color:var(--text);border-bottom:1px solid var(--border2)}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:var(--bg5)}
.loc-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:75vh;gap:20px;padding:40px 24px;text-align:center}
.loc-btn{background:var(--amber);border:none;border-radius:var(--radius-sm);padding:15px 28px;color:#000;font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;cursor:pointer;width:100%;max-width:280px}
.loc-skip{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 28px;color:var(--text2);font-family:'DM Sans',sans-serif;font-weight:500;font-size:15px;cursor:pointer;width:100%;max-width:280px}
.install-banner{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.install-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:2px;line-height:1}
.err-banner{background:rgba(255,69,58,0.08);border:1px solid rgba(255,69,58,0.2);border-radius:var(--radius-xs);padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--red);font-family:'DM Mono',monospace}
.tbadge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace}
.mono{font-family:'DM Mono',monospace}
.fade-up{animation:fadeUp 0.25s ease forwards}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.leaflet-tile{filter:invert(1) hue-rotate(180deg) saturate(0.2) brightness(0.45)}
.leaflet-container{background:#050800}
</style>

<script>
const LOGO='IMG_0441.png';
const WX_EMOJI={"Thunderstorm":"⛈️","Drizzle":"🌦️","Rain":"🌧️","Snow":"❄️","Mist":"🌫️","Fog":"🌫️","Haze":"🌫️","Dust":"💨","Tornado":"🌪️","Clear":"☀️","Sunny":"☀️","Clouds":"☁️","Cloudy":"☁️","Partly":"⛅"};
let state={tab:'dash',wx:null,fc:[],hl:[],loading:false,located:false,time:new Date(),loc:{lat:40.7128,lon:-74.006},showInstall:true,deferredPrompt:null,error:null};
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();state.deferredPrompt=e;render();});
setInterval(()=>{state.time=new Date();document.querySelectorAll('.clock').forEach(el=>el.textContent=fmt12(state.time));},1000);
function fmt12(d){return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function getEmoji(t){const k=Object.keys(WX_EMOJI).find(k=>(t||'').toLowerCase().includes(k.toLowerCase()));return WX_EMOJI[k]||'🌤️';}
async function fetchWeatherGov(lat,lon,name){
  state.loading=true;state.located=true;state.error=null;render();
  try{
    const ptRes=await fetch(`https://api.weather.gov/points/${lat.toFixed(4)},${lon.toFixed(4)}`);
    if(!ptRes.ok)throw new Error('Location not supported — US only');
    const pt=await ptRes.json();
    const{gridId,gridX,gridY,relativeLocation}=pt.properties;
    const city=relativeLocation?.properties?.city||name;
    const st=relativeLocation?.properties?.state||'';
    const displayName=(name==='Current Location')?`${city}, ${st}`:name;
    const[fcRes,hlRes]=await Promise.all([fetch(pt.properties.forecast),fetch(pt.properties.forecastHourly)]);
    const[fcData,hlData]=await Promise.all([fcRes.json(),hlRes.json()]);
    let obs=null;
    try{
      const stRes=await fetch(`https://api.weather.gov/gridpoints/${gridId}/${gridX},${gridY}/stations`);
      const stData=await stRes.json();
      const stId=stData.features[0].properties.stationIdentifier;
      const obRes=await fetch(`https://api.weather.gov/stations/${stId}/observations/latest`);
      obs=(await obRes.json()).properties;
    }catch(e){}
    const h0=hlData.properties.periods[0];
    const tempF=obs?.temperature?.value!=null?Math.round(obs.temperature.value*9/5+32):h0.temperature;
    const windSpd=obs?.windSpeed?.value!=null?Math.round(obs.windSpeed.value*0.621371):parseInt(h0.windSpeed)||0;
    const humidity=obs?.relativeHumidity?.value!=null?Math.round(obs.relativeHumidity.value):60;
    const vis=obs?.visibility?.value!=null?Math.round(obs.visibility.value*3.28084):52800;
    const pressure=obs?.barometricPressure?.value!=null?Math.round(obs.barometricPressure.value/100):1013;
    const dewF=obs?.dewpoint?.value!=null?Math.round(obs.dewpoint.value*9/5+32):tempF-15;
    const condRaw=obs?.textDescription||h0.shortForecast;
    const daily=fcData.properties.periods;
    const fc=[];
    for(let i=0;i<daily.length&&fc.length<7;i++){
      if(!daily[i].isDaytime)continue;
      const night=daily[i+1];
      fc.push({day:fc.length===0?'Today':['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(daily[i].startTime).getDay()],cond:daily[i].shortForecast,emoji:getEmoji(daily[i].shortForecast),high:daily[i].temperature,low:night?.temperature||daily[i].temperature-15,pop:parseInt(daily[i].probabilityOfPrecipitation?.value)||0,wind:parseInt(daily[i].windSpeed)||0,humidity:60});
    }
    const hl=hlData.properties.periods.slice(0,12).map((p,i)=>{
      const t=new Date(p.startTime);
      return{time:i===0?'Now':(t.getHours()<12?t.getHours()+'am':(t.getHours()-12||12)+'pm'),temp:p.temperature,emoji:getEmoji(p.shortForecast),pop:parseInt(p.probabilityOfPrecipitation?.value)||0,wind:parseInt(p.windSpeed)||0};
    });
    const sun=getSunTimes(lat,lon);
    state.wx={name:displayName,temp:tempF,feelsLike:Math.round(tempF-(humidity>60?(humidity-60)*0.1:0)-windSpd*0.3),high:fc[0]?.high||tempF+5,low:fc[0]?.low||tempF-10,wind:windSpd,gusts:windSpd+5,humidity,visibility:vis,pressure,uvi:0,dewPoint:dewF,condition:condRaw,emoji:getEmoji(condRaw),precip:0,sunrise:sun.sunrise,sunset:sun.sunset};
    state.fc=fc;state.hl=hl;state.loading=false;render();
  }catch(e){
    state.error=e.message||'Failed to load weather';
    state.loading=false;
    const C=["Clear","Partly Cloudy","Overcast","Light Rain","Thunderstorm","Snow"];
    const E={"Clear":"☀️","Partly Cloudy":"⛅","Overcast":"☁️","Light Rain":"🌦️","Thunderstorm":"⛈️","Snow":"❄️"};
    const rnd=(a,b)=>Math.round(a+Math.random()*(b-a));
    const c=C[rnd(0,5)];const t=rnd(45,80);const w=rnd(0,20);
    const sun2=getSunTimes(state.loc.lat,state.loc.lon);
    state.wx={name:name,temp:t,feelsLike:t-5,high:t+6,low:t-10,wind:w,gusts:w+5,humidity:rnd(30,75),precip:0,visibility:52800,pressure:1013,uvi:3,dewPoint:t-12,condition:c,emoji:E[c]||'🌤️',sunrise:sun2.sunrise,sunset:sun2.sunset};
    state.fc=Array.from({length:7},(_,i)=>{const cc=C[rnd(0,5)];const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];const td=new Date().getDay();return{day:i===0?"Today":days[(td+i)%7],cond:cc,emoji:E[cc]||'🌤️',high:rnd(45,85),low:rnd(28,55),pop:rnd(0,70),wind:rnd(0,22),humidity:rnd(30,75)};});
    state.hl=Array.from({length:12},(_,i)=>{const h=new Date();h.setHours(h.getHours()+i);const cc=C[rnd(0,5)];return{time:i===0?"Now":(h.getHours()<12?h.getHours()+"am":(h.getHours()-12||12)+"pm"),temp:rnd(48,80),emoji:E[cc]||'🌤️',pop:rnd(0,50),wind:rnd(0,18)};});
    render();
  }
}
let srchTimer=null;
let srchResults=[];
function initSearch(){
  const inp=document.getElementById('srch');
  const box=document.getElementById('ac-box');
  if(!inp||!box)return;
  inp.addEventListener('input',function(){
    const q=this.value;
    clearTimeout(srchTimer);
    if(q.length<3){box.style.display='none';box.innerHTML='';srchResults=[];return;}
    srchTimer=setTimeout(async()=>{
      try{
        const res=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=6&countrycodes=us&addressdetails=1');
        const data=await res.json();
        srchResults=data.map(d=>({name:d.address.city||d.address.town||d.address.village||d.address.county||d.name,state:d.address.state_code||d.address.state||'',lat:parseFloat(d.lat),lon:parseFloat(d.lon)}));
        if(srchResults.length){
          box.innerHTML=srchResults.map((r,i)=>'<div class="ac-item" onmousedown="event.preventDefault();pickResult('+i+')">'+r.name+(r.state?', '+r.state:'')+'</div>').join('');
          box.style.display='block';
        }else{box.style.display='none';}
      }catch(e){box.style.display='none';}
    },400);
  });
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&srchResults[0])pickResult(0);
    if(e.key==='Escape'){box.style.display='none';box.innerHTML='';}
  });
  document.addEventListener('touchstart',function(e){
    if(!e.target.closest('.srch-inner')){box.style.display='none';}
  });
}
function pickResult(i){
  const r=srchResults[i];if(!r)return;
  const inp=document.getElementById('srch');
  const box=document.getElementById('ac-box');
  if(inp)inp.value='';
  if(box){box.style.display='none';box.innerHTML='';}
  srchResults=[];
  state.loc={lat:r.lat,lon:r.lon};
  fetchWeatherGov(r.lat,r.lon,r.name+(r.state?', '+r.state:''));
}
function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      p=>{state.loc={lat:p.coords.latitude,lon:p.coords.longitude};fetchWeatherGov(p.coords.latitude,p.coords.longitude,'Current Location');},
      ()=>fetchWeatherGov(40.7128,-74.006,'New York, NY'),
      {enableHighAccuracy:true,timeout:10000}
    );
  }else fetchWeatherGov(40.7128,-74.006,'New York, NY');
}
function getSunTimes(lat,lon){
  const now=new Date();const J2000=2451545.0;
  const jd=(now.getTime()/86400000)+2440587.5;const n=jd-J2000;
  const L=(280.46+0.9856474*n)%360;const g=((357.528+0.9856003*n)%360)*Math.PI/180;
  const lam=(L+1.915*Math.sin(g)+0.02*Math.sin(2*g))*Math.PI/180;
  const dec=Math.asin(Math.sin(23.439*Math.PI/180)*Math.sin(lam));
  const latR=lat*Math.PI/180;
  const cosH=(Math.cos(90.833*Math.PI/180)-Math.sin(latR)*Math.sin(dec))/(Math.cos(latR)*Math.cos(dec));
  if(Math.abs(cosH)>1)return{sunrise:'--:--',sunset:'--:--'};
  const H=Math.acos(cosH)*180/Math.PI;
  const solarNoon=12-lon/15;
  const riseH=solarNoon-H/15;const setH=solarNoon+H/15;
  const toTime=h=>{const hr=Math.floor(h)%24;const mn=Math.round((h%1)*60);const ampm=hr<12?'AM':'PM';return(hr%12||12)+':'+(mn<10?'0':'')+mn+' '+ampm;};
  return{sunrise:toTime(riseH),sunset:toTime(setH)};
}
function isSunUp(w){
  if(!w||!w.sunrise||!w.sunset)return true;
  const parse=s=>{const[time,ap]=s.split(' ');let[h,m]=time.split(':').map(Number);if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;return h*60+m;};
  const now=new Date().getHours()*60+new Date().getMinutes();
  return now>=parse(w.sunrise)&&now<parse(w.sunset);
}

function startRadar(id){const canvas=document.getElementById(id);if(!canvas||radarAnims.has(id))return;const ctx=canvas.getContext('2d');function draw(){const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);radarBlobs.forEach(b=>{b.x=Math.max(0.04,Math.min(0.96,b.x+b.vx));b.y=Math.max(0.04,Math.min(0.96,b.y+b.vy));const cx=b.x*W,cy=b.y*H,rad=b.r*Math.min(W,H);const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);const a=b.intensity*0.55;if(b.color==='green'){g.addColorStop(0,`rgba(48,209,88,${a})`);g.addColorStop(1,'rgba(0,80,20,0)');}else if(b.color==='yellow'){g.addColorStop(0,`rgba(255,159,10,${a})`);g.addColorStop(1,'rgba(100,50,0,0)');}else{g.addColorStop(0,`rgba(255,69,58,${a})`);g.addColorStop(1,'rgba(80,0,0,0)');}ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();});radarSweep=(radarSweep+0.01)%(Math.PI*2);ctx.save();ctx.translate(W/2,H/2);ctx.rotate(radarSweep);const sr=Math.min(W,H)/2*0.85;for(let a=0;a<0.5;a+=0.008){ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,sr,-a,-a+0.009);ctx.closePath();ctx.fillStyle=`rgba(255,159,10,${(0.5-a)*0.15})`;ctx.fill();}ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(sr,0);ctx.strokeStyle='rgba(255,159,10,0.7)';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();[0.3,0.6,0.9].forEach(r=>{ctx.beginPath();ctx.arc(W/2,H/2,r*Math.min(W,H)/2,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;ctx.stroke();});radarAnims.set(id,requestAnimationFrame(draw));}draw();}

  let main='';
  if(!state.located){main=renderLoc();}
  else if(state.loading){main=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px;gap:18px"><img src="${LOGO}" style="width:80px;height:80px;object-fit:contain;border-radius:20px;box-shadow:0 8px 32px rgba(255,159,10,0.25)"><div style="font-size:15px;font-weight:600;color:var(--text2)">Fetching weather data...</div><div style="width:160px;height:2px;background:rgba(255,255,255,0.06);border-radius:1px;overflow:hidden"><div style="height:100%;background:var(--amber);width:60%;border-radius:1px;animation:scan 1.5s ease infinite"></div></div><div class="mono" style="color:var(--text3);font-size:11px;letter-spacing:1px">WEATHER.GOV</div></div>`;}
  else if(w){
    const isIOS=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    const isStandalone=window.navigator.standalone;
    const banner=(isIOS&&!isStandalone&&state.showInstall)?`<div class="install-banner"><img src="${LOGO}" style="width:40px;height:40px;object-fit:contain;border-radius:10px"><div style="flex:1"><div style="font-size:14px;font-weight:600">Install App</div><div style="font-size:12px;color:var(--text3);margin-top:2px">Tap Share → Add to Home Screen</div></div><button class="install-close" onclick="state.showInstall=false;render()">✕</button></div>`:'';
    switch(state.tab){case 'dash':main=banner+renderDash();break;case 'roof':main=renderRoof();break;case 'trail':main=renderTrail();break;case 'radar':main=renderRadar();break;case 'forecast':main=renderForecast();break;}
  }
  app.innerHTML=`<div class="app">
    <div class="hdr"><div class="hdr-row">
      <div class="logo-wrap"><img src="${LOGO}" class="logo-img"><div><div class="logo-name">Weather Wrangler</div><div class="logo-sub">JEEP TRAIL INTEL</div></div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="live-pill"><span class="live-dot"></span>LIVE</div>
        <div class="mono clock" style="color:var(--text3);font-size:11px">${fmt12(state.time)}</div>
      </div>
    </div></div>
    <div class="content">
      ${state.located&&!state.loading&&w?searchBarHTML():''}
      ${main}
      <div class="mono" style="text-align:center;margin-top:16px;color:var(--text3);font-size:10px;letter-spacing:1px;padding-bottom:8px">WEATHER WRANGLER · WEATHER.GOV</div>
    </div>
    <nav class="nav"><div class="nav-inner">${tabs.map(([v,icon,label])=>`<button class="nav-btn${state.tab===v?' active':''}" onclick="setTab('${v}')"><span class="nav-icon">${icon}</span>${label}</button>`).join('')}</div></nav>
  </div>`;
  requestAnimationFrame(()=>{
    if(!state.loading&&w){
      const mapIds={dash:['m-dash',true],radar:['m-radar',false]};
      const[mapId,compact]=mapIds[state.tab]||[];
      if(mapId){initLeafletMap(mapId,state.loc.lat,state.loc.lon,compact);startRadar(mapId+'-r');}
    }
    initSearch();
  });
}
render();
</script>
</body>
</html>
