<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">

<title>Weather Wrangler</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Share+Tech+Mono&display=swap">
<style>
:root{--black:#0d0d0d;--amber:#f5a800;--amber-lt:#ffc533;--amber-dk:#c07800;--panel:rgba(20,20,20,0.97);--border:rgba(245,168,0,0.22);--border2:rgba(245,168,0,0.08);--text:#d4c090;--text-dim:rgba(180,160,100,0.5);--green:#28a050;--blue:#2272b0;--red:#cc3322;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--black);font-family:'Barlow Condensed',sans-serif;color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.app{min-height:100vh;min-height:-webkit-fill-available;background:radial-gradient(ellipse 100% 50% at 50% 0%,rgba(245,168,0,0.08) 0%,transparent 60%),var(--black);padding-bottom:calc(62px + var(--safe-bottom))}
.hdr{background:linear-gradient(180deg,rgba(5,5,5,0.99),rgba(3,3,3,0.97));border-bottom:2px solid var(--amber-dk);padding:8px 14px;padding-top:calc(8px + var(--safe-top));position:sticky;top:0;z-index:200;box-shadow:0 2px 28px rgba(0,0,0,0.9)}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(245,168,0,0.5))}
.logo-name{font-size:21px;font-weight:900;letter-spacing:3px;color:var(--amber-lt);text-transform:uppercase;line-height:1.1}
.logo-sub{font-size:9px;letter-spacing:4px;color:var(--text-dim);font-family:'Share Tech Mono',monospace}
.nav{position:fixed;bottom:0;left:0;right:0;z-index:300;display:flex;background:rgba(5,5,5,0.97);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 -4px 20px rgba(0,0,0,0.8)}
.nav-btn{flex:1;padding:8px 2px 6px;border:none;background:transparent;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn.active{color:var(--amber-lt)}
.nav-icon{font-size:18px;line-height:1}
.content{padding:10px 12px;max-width:600px;margin:0 auto}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:13px 14px;margin-bottom:10px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%;background:var(--amber);opacity:0.5}
.plabel{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;font-family:'Share Tech Mono',monospace;display:flex;align-items:center;gap:8px}
.plabel::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
.srch-outer{display:flex;gap:7px;margin-bottom:11px}
.srch-inner{position:relative;flex:1}
.srch-in{width:100%;background:rgba(0,0,0,0.7);border:1px solid var(--border);border-radius:4px;padding:9px 13px;color:var(--text);font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;-webkit-appearance:none}
.srch-in::placeholder{color:var(--text-dim)}
.srch-btn{background:rgba(245,168,0,0.12);border:1px solid rgba(245,168,0,0.4);border-radius:4px;padding:9px 14px;color:var(--amber-lt);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;-webkit-appearance:none;white-space:nowrap}
.ac-box{position:absolute;top:100%;left:0;right:0;background:#111;border:1px solid var(--border);border-top:none;border-radius:0 0 4px 4px;z-index:500;max-height:220px;overflow-y:auto}
.ac-item{padding:10px 13px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text);border-bottom:1px solid var(--border2)}
.ac-item:last-child{border-bottom:none}
.ac-item:active{background:rgba(245,168,0,0.1);color:var(--amber-lt)}
.ac-name{font-size:12px}
.ac-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
.sring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.sring-inner{position:absolute;text-align:center}
.sring-num{font-size:30px;font-weight:900;line-height:1}
.sring-lbl{font-size:9px;letter-spacing:2px;color:var(--text-dim);font-family:'Share Tech Mono',monospace}
.gauge-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.gauge-lbl{font-size:10px;letter-spacing:1px;width:90px;color:var(--text);font-weight:600;font-family:'Share Tech Mono',monospace}
.gauge-track{flex:1;height:7px;background:rgba(0,0,0,0.6);border-radius:1px;overflow:hidden}
.gauge-fill{height:100%;border-radius:1px}
.gauge-val{font-family:'Share Tech Mono',monospace;font-size:11px;width:30px;text-align:right}
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.wgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.widget{background:rgba(8,8,8,0.97);border:1px solid var(--border);border-radius:4px;padding:11px 12px}
.w-icon{font-size:20px;margin-bottom:5px}
.w-val{font-size:22px;font-weight:900;line-height:1;color:#fff}

.tbadge{padding:2px 8px;border-radius:2px;font-size:10px;font-weight:700;letter-spacing:2px;font-family:'Share Tech Mono',monospace}
.spill{background:rgba(40,160,80,0.12);border:1px solid rgba(40,160,80,0.35);border-radius:2px;padding:3px 9px;font-size:10px;letter-spacing:2px;color:var(--green);font-family:'Share Tech Mono',monospace;display:inline-block}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#28a050;animation:pulsedot 2s infinite;margin-right:5px;vertical-align:middle}
.hscroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.hcard{min-width:56px;background:rgba(8,8,8,0.97);border:1px solid var(--border);border-radius:3px;padding:9px 5px;text-align:center;flex-shrink:0}
.frow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border2)}
.frow:last-child{border-bottom:none}
.map-wrap{width:100%;border-radius:3px;overflow:hidden;border:1px solid var(--border);position:relative;background:#050800}
.radar-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;opacity:0.7}
.map-hud{position:absolute;top:8px;right:8px;z-index:10;display:flex;flex-direction:column;gap:5px}
.hud-pill{background:rgba(5,5,5,0.9);border:1px solid rgba(245,168,0,0.3);border-radius:2px;padding:3px 8px;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--amber-lt);letter-spacing:1px}
.map-legend{position:absolute;bottom:8px;left:8px;z-index:10;display:flex;gap:7px}
.legend-item{display:flex;align-items:center;gap:4px;background:rgba(5,5,5,0.85);border-radius:2px;padding:3px 7px;border:1px solid rgba(245,168,0,0.18)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.legend-txt{color:rgba(180,160,100,0.75);font-size:9px;font-family:'Share Tech Mono',monospace}
.install-banner{background:linear-gradient(135deg,rgba(245,168,0,0.15),rgba(245,168,0,0.05));border:1px solid rgba(245,168,0,0.4);border-radius:4px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.install-close{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;padding:4px}
.loc-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:18px;padding:40px 20px;text-align:center}
.loc-btn{background:var(--amber);border:none;border-radius:4px;padding:14px 28px;color:#000;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:2px;cursor:pointer;width:100%;max-width:280px}
.loc-skip{background:transparent;border:1px solid var(--border);border-radius:4px;padding:10px 28px;color:var(--text-dim);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;cursor:pointer;width:100%;max-width:280px;margin-top:-6px}
.err-banner{background:rgba(204,51,34,0.12);border:1px solid rgba(204,51,34,0.4);border-radius:4px;padding:10px 14px;margin-bottom:10px;font-family:'Share Tech Mono',monospace;font-size:11px;color:#ff6655;letter-spacing:1px}
.mono{font-family:'Share Tech Mono',monospace}
.fade-up{animation:fadeUp 0.3s ease forwards}
@keyframes pulsedot{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.leaflet-tile{filter:invert(1) hue-rotate(180deg) saturate(0.35) brightness(0.55)}
.leaflet-container{background:#050800}
</style>

<body>
<div id="app"></div>
<script>
const LOGO='IMG_0441.png';
const WX_EMOJI={"Thunderstorm":"⛈️","Drizzle":"🌦️","Rain":"🌧️","Snow":"❄️","Mist":"🌫️","Smoke":"🌫️","Haze":"🌫️","Dust":"💨","Fog":"🌫️","Sand":"💨","Tornado":"🌪️","Clear":"☀️","Sunny":"☀️","Clouds":"☁️","Cloudy":"☁️","Partly":"⛅"};

let state={tab:‘dash’,wx:null,fc:[],hl:[],loading:false,located:false,time:new Date(),srchVal:’’,srchResults:[],showDropdown:false,loc:{lat:40.7128,lon:-74.006},showInstall:true,deferredPrompt:null,error:null};

window.addEventListener(‘beforeinstallprompt’,e=>{e.preventDefault();state.deferredPrompt=e;render();});
setInterval(()=>{state.time=new Date();document.querySelectorAll(’.clock’).forEach(el=>el.textContent=fmt12(state.time));},1000);

function fmt12(d){return d.toLocaleTimeString([],{hour:‘2-digit’,minute:‘2-digit’});}
function getEmoji(text){const t=text||’’;const k=Object.keys(WX_EMOJI).find(k=>t.toLowerCase().includes(k.toLowerCase()));return WX_EMOJI[k]||‘🌤️’;}

async function fetchWeatherGov(lat,lon,name){
state.loading=true;state.located=true;state.error=null;render();
try{
const ptRes=await fetch(`https://api.weather.gov/points/${lat.toFixed(4)},${lon.toFixed(4)}`);
if(!ptRes.ok)throw new Error(‘Location not supported by Weather.gov — US locations only’);
const pt=await ptRes.json();
const{gridId,gridX,gridY,relativeLocation}=pt.properties;
const city=relativeLocation?.properties?.city||name;
const st=relativeLocation?.properties?.state||’’;
const displayName=(name===‘Current Location’)?`${city}, ${st}`:name;

```
const[fcRes,hlRes]=await Promise.all([fetch(pt.properties.forecast),fetch(pt.properties.forecastHourly)]);
const[fcData,hlData]=await Promise.all([fcRes.json(),hlRes.json()]);

let obs=null;
try{
  const stRes=await fetch(`https://api.weather.gov/gridpoints/${gridId}/${gridX},${gridY}/stations`);
  const stData=await stRes.json();
  const stId=stData.features[0].properties.stationIdentifier;
  const obRes=await fetch(`https://api.weather.gov/stations/${stId}/observations/latest`);
  obs=(await obRes.json()).properties;
}catch(e){}

const h0=hlData.properties.periods[0];
const tempF=obs?.temperature?.value!=null?Math.round(obs.temperature.value*9/5+32):h0.temperature;
const windSpd=obs?.windSpeed?.value!=null?Math.round(obs.windSpeed.value*0.621371):parseInt(h0.windSpeed)||0;
const humidity=obs?.relativeHumidity?.value!=null?Math.round(obs.relativeHumidity.value):60;
const vis=obs?.visibility?.value!=null?Math.round(obs.visibility.value*3.28084):52800;
const pressure=obs?.barometricPressure?.value!=null?Math.round(obs.barometricPressure.value/100):1013;
const dewF=obs?.dewpoint?.value!=null?Math.round(obs.dewpoint.value*9/5+32):tempF-15;
const condRaw=obs?.textDescription||h0.shortForecast;

const daily=fcData.properties.periods;
const fc=[];
for(let i=0;i<daily.length&&fc.length<7;i++){
  if(!daily[i].isDaytime)continue;
  const night=daily[i+1];
  fc.push({day:fc.length===0?'Today':['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date(daily[i].startTime).getDay()],cond:daily[i].shortForecast,emoji:getEmoji(daily[i].shortForecast),high:daily[i].temperature,low:night?.temperature||daily[i].temperature-15,pop:parseInt(daily[i].probabilityOfPrecipitation?.value)||0,wind:parseInt(daily[i].windSpeed)||0,humidity:60});
}

const hl=hlData.properties.periods.slice(0,12).map((p,i)=>{
  const t=new Date(p.startTime);
  return{time:i===0?'Now':(t.getHours()<12?t.getHours()+'am':(t.getHours()-12||12)+'pm'),temp:p.temperature,emoji:getEmoji(p.shortForecast),pop:parseInt(p.probabilityOfPrecipitation?.value)||0,wind:parseInt(p.windSpeed)||0};
});

state.wx={name:displayName,temp:tempF,feelsLike:Math.round(tempF-(humidity>60?(humidity-60)*0.1:0)-windSpd*0.3),high:fc[0]?.high||tempF+5,low:fc[0]?.low||tempF-10,wind:windSpd,gusts:windSpd+5,humidity,visibility:vis,pressure,uvi:0,dewPoint:dewF,condition:condRaw,emoji:getEmoji(condRaw),precip:0};
state.fc=fc;state.hl=hl;state.loading=false;render();
```

}catch(e){
state.error=e.message||‘Failed to load weather data’;
state.loading=false;
const CONDITIONS=[“Clear”,“Partly Cloudy”,“Overcast”,“Light Rain”,“Thunderstorm”,“Snow”];
const CEMOJI={“Clear”:“☀️”,“Partly Cloudy”:“⛅”,“Overcast”:“☁️”,“Light Rain”:“🌦️”,“Thunderstorm”:“⛈️”,“Snow”:“❄️”};
const rnd=(a,b)=>Math.round(a+Math.random()*(b-a));
const c=CONDITIONS[rnd(0,5)];const t=rnd(45,80);const w=rnd(0,20);
state.wx={name:name,temp:t,feelsLike:t-5,high:t+6,low:t-10,wind:w,gusts:w+5,humidity:rnd(30,75),precip:0,visibility:52800,pressure:1013,uvi:3,dewPoint:t-12,condition:c,emoji:CEMOJI[c]||‘🌤️’};
state.fc=Array.from({length:7},(*,i)=>{const cc=CONDITIONS[rnd(0,5)];const days=[“Sun”,“Mon”,“Tue”,“Wed”,“Thu”,“Fri”,“Sat”];const td=new Date().getDay();return{day:i===0?“Today”:days[(td+i)%7],cond:cc,emoji:CEMOJI[cc]||‘🌤️’,high:rnd(45,85),low:rnd(28,55),pop:rnd(0,70),wind:rnd(0,22),humidity:rnd(30,75)};});
state.hl=Array.from({length:12},(*,i)=>{const h=new Date();h.setHours(h.getHours()+i);const cc=CONDITIONS[rnd(0,5)];return{time:i===0?“Now”:(h.getHours()<12?h.getHours()+“am”:(h.getHours()-12||12)+“pm”),temp:rnd(48,80),emoji:CEMOJI[cc]||‘🌤️’,pop:rnd(0,50),wind:rnd(0,18)};});
render();
}
}

let acTimer=null;
async function geocodeSearch(q){
if(q.length<3){state.srchResults=[];state.showDropdown=false;render();return;}
clearTimeout(acTimer);
acTimer=setTimeout(async()=>{
try{
const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&countrycodes=us&addressdetails=1`);
const data=await res.json();
state.srchResults=data.map(d=>({name:d.address.city||d.address.town||d.address.village||d.address.county||d.name,state:d.address.state_code||d.address.state||’’,lat:parseFloat(d.lat),lon:parseFloat(d.lon)}));
state.showDropdown=state.srchResults.length>0;
render();
const el=document.getElementById(‘srch’);
if(el)el.focus();
}catch(e){}
},350);
}

function selectLocation(idx){
const r=state.srchResults[idx];
if(!r)return;
state.srchVal=’’;state.showDropdown=false;state.srchResults=[];
state.loc={lat:r.lat,lon:r.lon};
fetchWeatherGov(r.lat,r.lon,`${r.name}${r.state?', '+r.state:''}`);
}

function getLocation(){
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(
p=>{state.loc={lat:p.coords.latitude,lon:p.coords.longitude};fetchWeatherGov(p.coords.latitude,p.coords.longitude,‘Current Location’);},
()=>fetchWeatherGov(40.7128,-74.006,‘New York, NY’),
{enableHighAccuracy:true,timeout:10000}
);
}else fetchWeatherGov(40.7128,-74.006,‘New York, NY’);
}

function roofScore(w){let s=100;const reasons=[],positives=[];if(w.temp<35){s-=30;reasons.push(“Freezing temps”);}else if(w.temp<50){s-=10;reasons.push(“Cold temps”);}else if(w.temp>=65&&w.temp<=85){s+=5;positives.push(“Perfect temp range”);}else if(w.temp>96){s-=15;reasons.push(“Extreme heat”);}if(w.wind>40){s-=35;reasons.push(“Dangerous gusts”);}else if(w.wind>25){s-=20;reasons.push(“High winds”);}else if(w.wind>15){s-=8;reasons.push(“Moderate wind”);}else positives.push(“Calm winds”);const c=w.condition.toLowerCase();if(c.includes(“thunder”)){s-=50;reasons.push(“Active thunderstorm”);}else if(c.includes(“heavy rain”)){s-=40;reasons.push(“Heavy precipitation”);}else if(c.includes(“snow”)){s-=35;reasons.push(“Snow conditions”);}else if(c.includes(“rain”)||c.includes(“drizzle”)){s-=20;reasons.push(“Rain present”);}else if(c.includes(“fog”)){s-=10;reasons.push(“Low visibility fog”);}else if(c.includes(“clear”)||c.includes(“sunny”)||c.includes(“partly”))positives.push(“Clear skies”);if(w.humidity>90){s-=8;reasons.push(“Very high humidity”);}return{score:Math.max(0,Math.min(100,s)),reasons,positives};}
function trailConds(w){const c=w.condition.toLowerCase();const rain=c.includes(“rain”)||c.includes(“drizzle”)||c.includes(“thunder”);return{mud:Math.round(Math.min(100,rain?w.humidity*0.7+20:Math.max(0,w.humidity*0.3-10))),rock:Math.round(c.includes(“fog”)||c.includes(“snow”)?55:c.includes(“rain”)?70:85),dust:Math.round(rain?10:Math.max(0,90-w.humidity*0.8)),waterCrossing:Math.round(rain?60:20),traction:Math.round(rain||c.includes(“snow”)?40:80),visibility:Math.round(w.visibility>15000?95:w.visibility>5000?70:40)};}
function trailDayScore(day){const c=day.cond.toLowerCase();let s=80;if(c.includes(“rain”))s-=25;if(c.includes(“thunder”))s-=20;if(c.includes(“snow”))s-=30;if(day.wind>30)s-=10;if((c.includes(“clear”)||c.includes(“sunny”)||c.includes(“partly”))&&day.pop<20)s+=10;if(day.high>=55&&day.high<=80)s+=5;s=Math.max(0,Math.min(100,s));const r=s>=80?“IDEAL”:s>=60?“GOOD”:s>=40?“FAIR”:“POOR”;const rc=s>=80?”#28a050”:s>=60?”#f5a800”:s>=40?”#c07800”:”#cc3322”;return{score:s,rating:r,ratingColor:rc};}
const sc=s=>s>=75?”#28a050”:s>=50?”#f5a800”:s>=30?”#c07800”:”#cc3322”;

let radarBlobs=Array.from({length:14},()=>({x:0.1+Math.random()*0.8,y:0.1+Math.random()*0.8,r:0.04+Math.random()*0.11,intensity:0.3+Math.random()*0.6,color:[‘green’,‘green’,‘green’,‘yellow’,‘red’][Math.floor(Math.random()*5)],vx:(Math.random()-0.5)*0.0005,vy:(Math.random()-0.5)*0.0005}));
let radarSweep=0;const radarAnims=new Map();
function startRadar(id){const canvas=document.getElementById(id);if(!canvas||radarAnims.has(id))return;const ctx=canvas.getContext(‘2d’);function draw(){const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);radarBlobs.forEach(b=>{b.x=Math.max(0.04,Math.min(0.96,b.x+b.vx));b.y=Math.max(0.04,Math.min(0.96,b.y+b.vy));const cx=b.x*W,cy=b.y*H,rad=b.r*Math.min(W,H);const g=ctx.createRadialGradient(cx,cy,0,cx,cy,rad);const a=b.intensity*0.6;if(b.color===‘green’){g.addColorStop(0,`rgba(50,200,80,${a})`);g.addColorStop(1,‘rgba(0,80,20,0)’);}else if(b.color===‘yellow’){g.addColorStop(0,`rgba(245,168,0,${a})`);g.addColorStop(1,‘rgba(100,50,0,0)’);}else{g.addColorStop(0,`rgba(220,40,20,${a})`);g.addColorStop(1,‘rgba(80,0,0,0)’);}ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();});radarSweep=(radarSweep+0.012)%(Math.PI*2);ctx.save();ctx.translate(W/2,H/2);ctx.rotate(radarSweep);const sr=Math.min(W,H)/2*0.82;for(let a=0;a<0.55;a+=0.008){ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,sr,-a,-a+0.009);ctx.closePath();ctx.fillStyle=`rgba(245,168,0,${(0.55-a)*0.18})`;ctx.fill();}ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(sr,0);ctx.strokeStyle=‘rgba(245,200,80,0.8)’;ctx.lineWidth=1.5;ctx.stroke();ctx.restore();[0.28,0.56,0.84].forEach(r=>{ctx.beginPath();ctx.arc(W/2,H/2,r*Math.min(W,H)/2,0,Math.PI*2);ctx.strokeStyle=‘rgba(245,168,0,0.15)’;ctx.lineWidth=1;ctx.stroke();});radarAnims.set(id,requestAnimationFrame(draw));}draw();}
function stopAllRadars(){radarAnims.forEach(id=>cancelAnimationFrame(id));radarAnims.clear();}
const leafletMaps={};
function initLeafletMap(id,lat,lon,compact){if(leafletMaps[id])return;if(!window.L){setTimeout(()=>initLeafletMap(id,lat,lon,compact),300);return;}const el=document.getElementById(id);if(!el)return;const map=L.map(el,{center:[lat,lon],zoom:compact?7:9,zoomControl:!compact,attributionControl:false,dragging:!compact,scrollWheelZoom:false,doubleClickZoom:false,tap:false});L.tileLayer(‘https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png’,{maxZoom:19}).addTo(map);const icon=L.divIcon({html:’<div style="width:14px;height:14px;border-radius:50%;background:#f5a800;border:2px solid #fff;box-shadow:0 0 12px rgba(245,168,0,0.9);"></div>’,iconSize:[14,14],iconAnchor:[7,7],className:’’});L.marker([lat,lon],{icon}).addTo(map);leafletMaps[id]=map;}
(function(){const lnk=document.createElement(‘link’);lnk.rel=‘stylesheet’;lnk.href=‘https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css’;document.head.appendChild(lnk);const s=document.createElement(‘script’);s.src=‘https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js’;document.head.appendChild(s);})();

function ringHTML(score,size=110){const r=size/2-9,circ=2*Math.PI*r,filled=(score/100)*circ,c=sc(score);return `<div class="sring-wrap" style="width:${size}px;height:${size}px"><svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="7"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="7" stroke-dasharray="${filled} ${circ-filled}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="filter:drop-shadow(0 0 6px ${c})"/></svg><div class="sring-inner"><div class="sring-num" style="color:${c}">${score}</div><div class="sring-lbl">SCORE</div></div></div>`;}
function gaugeHTML(label,value,color){return `<div class="gauge-row"><div class="gauge-lbl">${label}</div><div class="gauge-track"><div class="gauge-fill" style="width:${value}%;background:linear-gradient(90deg,${color}66,${color})"></div></div><div class="gauge-val" style="color:${color}">${value}</div></div>`;}
function mapHTML(id,compact=false){const h=compact?180:300;return `<div class="map-wrap" style="height:${h}px"><div id="${id}" style="position:absolute;inset:0;z-index:1;height:${h}px"></div><canvas id="${id}-r" class="radar-canvas" width="600" height="${h}" style="height:${h}px"></canvas><div class="map-hud"><div class="hud-pill"><span class="live-dot"></span>RADAR</div></div>${!compact?`<div class="map-legend"><div class="legend-item"><div class="legend-dot" style="background:#32c850"></div><span class="legend-txt">LIGHT</span></div><div class="legend-item"><div class="legend-dot" style="background:#f5a800"></div><span class="legend-txt">MOD</span></div><div class="legend-item"><div class="legend-dot" style="background:#dc2814"></div><span class="legend-txt">HEAVY</span></div></div>`:''}</div>`;}

function renderLoc(){return `<div class="loc-screen fade-up"><img src="${LOGO}" style="width:130px;height:130px;object-fit:contain;filter:drop-shadow(0 4px 20px rgba(245,168,0,0.6))"><div style="color:var(--amber-lt);font-size:26px;font-weight:900;letter-spacing:4px">WEATHER WRANGLER</div><div class="mono" style="color:var(--text-dim);font-size:11px;letter-spacing:3px;margin-top:-8px">JEEP TRAIL WEATHER INTEL</div><div style="color:var(--text);font-size:15px;margin-top:8px;line-height:1.5">Allow location for real-time<br>trail conditions at your position</div><button class="loc-btn" onclick="getLocation()">📍 USE MY LOCATION</button><button class="loc-skip" onclick="fetchWeatherGov(40.7128,-74.006,'New York, NY')">USE DEFAULT LOCATION</button></div>`;}

function renderDash(){const w=state.wx,rf=roofScore(w),tr=trailConds(w),rv=rf.score>=70?”#28a050”:rf.score>=40?”#f5a800”:”#cc3322”;return `<div class="fade-up">${state.error?`<div class="err-banner">⚠ ${state.error}</div>`:''}<div class="panel"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="mono" style="color:var(--text-dim);font-size:10px;letter-spacing:3px;margin-bottom:3px">📍 ${w.name.toUpperCase()}</div><div style="font-size:56px;font-weight:900;line-height:1;color:#fff;letter-spacing:-2px">${w.temp}°<span style="font-size:18px;color:var(--text-dim)">F</span></div><div style="color:var(--text);font-size:17px;margin-top:2px;font-weight:700">${w.condition}</div><div class="mono" style="color:var(--text-dim);font-size:11px;margin-top:1px">Feels ${w.feelsLike}° · H:${w.high}° L:${w.low}°</div></div><div style="text-align:center"><div style="font-size:52px">${w.emoji}</div><div class="mono" style="font-size:9px;color:var(--text-dim);margin-top:4px">💨${w.wind}mph 💧${w.humidity}%</div></div></div></div><div class="wgrid" style="margin-bottom:10px"><div class="widget" style="grid-column:span 2;border-color:${rv}44"><div class="plabel">ROOF REMOVAL STATUS</div><div style="display:flex;align-items:center;gap:14px">${ringHTML(rf.score,96)}<div style="flex:1"><div class="verdict" style="color:${rv};background:${rv}18;border:1px solid ${rv}44;margin-bottom:8px;font-size:12px">${rf.score>=70?"✓ GO TOPLESS":rf.score>=40?"⚠ USE CAUTION":"✕ KEEP ROOF ON"}</div>${rf.reasons.slice(0,2).map(r=>`<div class="mono" style="font-size:10px;color:#cc3322;margin-bottom:2px">▸ ${r}</div>`).join('')}${rf.positives.slice(0,2).map(p=>`<div class="mono" style="font-size:10px;color:#28a050;margin-bottom:2px">✓ ${p}</div>`).join('')}</div></div></div>${[{icon:"💨",val:w.wind+" mph",name:"WIND"},{icon:"💧",val:w.humidity+"%",name:"HUMIDITY"},{icon:"👁️",val:Math.round(w.visibility/5280)+" mi",name:"VISIBILITY"},{icon:"📊",val:w.pressure+" hPa",name:"PRESSURE"}].map(x=>`<div class="widget"><div class="w-icon">${x.icon}</div><div class="w-val">${x.val}</div><div class="w-name">${x.name}</div></div>`).join('')}<div class="widget" style="grid-column:span 2"><div class="plabel">TRAIL CONDITIONS</div><div class="wgrid3">${[{n:"MUD",v:tr.mud,c:"#8B6028"},{n:"TRACTION",v:tr.traction,c:"#28a050"},{n:"DUST",v:tr.dust,c:"#f5a800"},{n:"WATER",v:tr.waterCrossing,c:"#2272b0"},{n:"ROCK",v:tr.rock,c:"#888"},{n:"VISIB",v:tr.visibility,c:"#8e44ad"}].map(x=>`<div style="text-align:center;background:rgba(0,0,0,0.4);border-radius:2px;padding:8px 4px;border:1px solid ${x.c}22"><div style="font-size:17px;font-weight:900;color:${x.c}">${x.v}%</div><div class="mono" style="font-size:9px;color:var(--text-dim)">${x.n}</div></div>`).join('')}</div></div></div><div class="panel" style="padding:0;overflow:hidden;margin-bottom:10px"><div style="padding:8px 12px;display:flex;justify-content:space-between"><div class="plabel" style="margin-bottom:0">LIVE RADAR MAP</div><span class="mono" style="font-size:9px;color:var(--text-dim);cursor:pointer" onclick="setTab('radar')">EXPAND →</span></div>${mapHTML('m-dash',true)}</div><div class="panel"><div class="plabel">HOURLY</div><div class="hscroll">${state.hl.map(h=>`<div class="hcard"><div class="mono" style="font-size:9px;color:var(--text-dim);margin-bottom:4px">${h.time}</div><div style="font-size:15px;margin-bottom:3px">${h.emoji}</div><div style="font-size:13px;font-weight:800;color:#fff">${h.temp}°</div>${h.pop>15?`<div class="mono" style="font-size:9px;color:#2272b0;margin-top:2px">${h.pop}%</div>`:’’}</div>`).join('')}</div></div></div>`;}

function renderRoof(){const w=state.wx,rf=roofScore(w),rv=rf.score>=70?”#28a050”:rf.score>=40?”#f5a800”:”#cc3322”;return `<div class="fade-up"><div class="panel" style="text-align:center"><div class="plabel">ROOF REMOVAL ANALYSIS</div><div style="display:flex;justify-content:center;margin:12px 0">${ringHTML(rf.score,160)}</div><div class="verdict" style="margin:0 auto;font-size:15px;letter-spacing:3px;color:${rv};background:${rv}18;border:1px solid ${rv}44">${rf.score>=70?"✓ GO TOPLESS":rf.score>=40?"⚠ USE CAUTION":"✕ KEEP ROOF ON"}</div></div><div class="panel"><div class="plabel">POSITIVE FACTORS</div>${rf.positives.length===0?'<div class="mono" style="color:var(--text-dim);font-size:11px">No favorable conditions</div>':''}${rf.positives.map(p=>`<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border2)"><span style="color:#28a050">✓</span><span style="color:#28a050;font-size:14px">${p}</span></div>`).join('')}</div><div class="panel"><div class="plabel">CAUTION FLAGS</div>${rf.reasons.length===0?'<div class="mono" style="color:#28a050;font-size:11px">All conditions nominal</div>':''}${rf.reasons.map(r=>`<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border2)"><span style="color:#cc3322">▸</span><span style="color:#cc3322;font-size:14px">${r}</span></div>`).join('')}</div><div class="panel"><div class="plabel">FACTOR BREAKDOWN</div>${gaugeHTML("TEMP",w.temp>=65&&w.temp<=85?95:w.temp<35?10:w.temp<50?40:70,"#f5a800")}${gaugeHTML("WIND CLEAR",Math.max(0,100-w.wind*2),"#28a050")}${gaugeHTML("PRECIP FREE",w.condition.toLowerCase().includes("rain")||w.condition.toLowerCase().includes("thunder")||w.condition.toLowerCase().includes("snow")?10:70,"#2272b0")}${gaugeHTML("VISIBILITY",Math.min(100,Math.round(w.visibility/1584)),"#8e44ad")}</div><div class="panel"><div class="plabel">7-DAY ROOF PLANNER</div>${state.fc.map((d,i)=>{const ds=roofScore({...w,condition:d.cond,temp:d.high,wind:d.wind,humidity:d.humidity});const dc=sc(ds.score);return`<div class="frow"><span style="font-weight:${i===0?900:500};color:${i===0?'#fff':'var(--text)'};font-size:14px;width:46px">${d.day}</span><span style="font-size:17px">${d.emoji}</span><span style="color:var(--text-dim);font-size:12px;flex:1">${d.cond.substring(0,22)} · ${d.high}°</span><div style="text-align:center;min-width:58px"><div style="font-size:13px;font-weight:800;color:${dc}">${ds.score}/100</div><div class="mono" style="font-size:9px;color:${dc}">${ds.score>=70?“GO”:ds.score>=40?“CAUTION”:“NO-GO”}</div></div></div>`;}).join('')}</div></div>`;}

function renderTrail(){const w=state.wx,tr=trailConds(w);const packs=[[tr.mud>60,“🔩”,“Lockers”,“High mud detected”],[tr.mud>40||tr.waterCrossing>40,“🌀”,“Air Down Tires”,“Soft terrain present”],[tr.waterCrossing>50,“🛡️”,“Snorkel”,“Water crossing risk”],[tr.dust>60,“😷”,“Dust Mask”,“High dust index”],[tr.traction<50,“⛓️”,“Recovery Gear”,“Low traction”],[w.temp<40,“🧤”,“Cold Gear”,“Below 40°F”],[w.uvi>6,“🕶️”,“UV Protection”,“High UV”],[true,“🪫”,“Recovery Boards”,“Always carry”],[true,“📡”,“Trail Radio”,“Always bring”]].filter(x=>x[0]);return `<div class="fade-up"><div class="panel"><div class="plabel">TRAIL CONDITIONS</div>${gaugeHTML("MUD",tr.mud,"#8B6028")}${gaugeHTML("TRACTION",tr.traction,"#28a050")}${gaugeHTML("DUST",tr.dust,"#f5a800")}${gaugeHTML("WATER CROSS",tr.waterCrossing,"#2272b0")}${gaugeHTML("ROCK GRIP",tr.rock,"#888")}${gaugeHTML("VISIBILITY",tr.visibility,"#8e44ad")}</div><div class="panel"><div class="plabel">RECOMMENDED LOADOUT</div>${packs.map(([,icon,name,reason])=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border2)"><span style="font-size:17px;width:26px;text-align:center">${icon}</span><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--text)">${name}</div><div class="mono" style="font-size:10px;color:var(--text-dim)">${reason}</div></div><div style="background:rgba(40,160,80,0.1);border:1px solid rgba(40,160,80,0.3);border-radius:2px;padding:2px 8px;font-size:9px;color:#28a050;font-family:Share Tech Mono,monospace">PACK IT</div></div>`).join('')}</div><div class="panel"><div class="plabel">7-DAY TRAIL PLANNER</div>${state.fc.map((d,i)=>{const{rating,ratingColor,score}=trailDayScore(d);return`<div class="frow"><span style="font-weight:${i===0?900:500};color:${i===0?'#fff':'var(--text)'};font-size:14px;width:46px">${d.day}</span><span style="font-size:17px;margin-right:2px">${d.emoji}</span><div style="flex:1;padding:0 8px"><div style="height:5px;background:rgba(0,0,0,0.4);border-radius:1px;overflow:hidden"><div style="height:100%;width:${score}%;background:${ratingColor};border-radius:1px"></div></div></div><span style="color:var(--text-dim);font-size:11px;width:52px">${d.high}°/${d.low}°</span><span class="tbadge" style="background:${ratingColor}18;color:${ratingColor};border:1px solid ${ratingColor}44">${rating}</span></div>`;}).join('')}</div></div>`;}

function renderRadar(){const w=state.wx;return `<div class="fade-up"><div class="panel" style="padding:0;overflow:hidden;margin-bottom:10px"><div style="padding:9px 13px;display:flex;justify-content:space-between;align-items:center"><div class="plabel" style="margin-bottom:0">LIVE RADAR — ${w.name.toUpperCase()}</div><span class="mono clock" style="font-size:10px;color:var(--text-dim)">${fmt12(state.time)}</span></div>${mapHTML('m-radar',false)}</div><div class="wgrid">${[{icon:"💧",val:w.humidity+"%",name:"HUMIDITY"},{icon:"👁️",val:Math.round(w.visibility/5280)+" mi",name:"VISIBILITY"},{icon:"📊",val:w.pressure+" hPa",name:"PRESSURE"},{icon:"🌡️",val:w.dewPoint+"°",name:"DEW PT"}].map(x=>`<div class="widget"><div class="w-icon">${x.icon}</div><div class="w-val">${x.val}</div><div class="w-name">${x.name}</div></div>`).join('')}</div></div>`;}

function setTab(t){stopAllRadars();Object.keys(leafletMaps).forEach(k=>{try{leafletMaps[k].remove();}catch(e){}delete leafletMaps[k];});state.tab=t;render();}

function render(){
const app=document.getElementById(‘app’);
const w=state.wx;
const tabs=[[‘dash’,‘⊞’,‘DASH’],[‘roof’,‘🔓’,‘ROOF’],[‘trail’,‘🗺’,‘TRAIL’],[‘radar’,‘📡’,‘RADAR’],[‘forecast’,‘📅’,‘7-DAY’]];
let main=’’;
if(!state.located){main=renderLoc();}
else if(state.loading){main=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px"><img src="${LOGO}" style="width:100px;height:100px;object-fit:contain;filter:drop-shadow(0 4px 16px rgba(245,168,0,0.6))"><div class="mono" style="color:var(--amber-lt);letter-spacing:4px;font-size:12px">FETCHING WEATHER DATA...</div><div style="width:180px;height:2px;background:rgba(245,168,0,0.1);border-radius:1px;overflow:hidden"><div style="height:100%;background:var(--amber);width:65%;border-radius:1px;animation:scan 1.5s ease infinite"></div></div><div class="mono" style="color:var(--text-dim);font-size:10px;letter-spacing:2px;margin-top:4px">WEATHER.GOV</div></div>`;}
else if(w){
const isIOS=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
const isStandalone=window.navigator.standalone;
const banner=(isIOS&&!isStandalone&&state.showInstall)?`<div class="install-banner"><img src="${LOGO}" style="width:36px;height:36px;object-fit:contain"><div style="flex:1"><div style="font-size:14px;font-weight:800;color:var(--amber-lt);letter-spacing:1px">INSTALL APP</div><div class="mono" style="font-size:11px;color:var(--text-dim);margin-top:2px">Tap Share → Add to Home Screen</div></div><button class="install-close" onclick="state.showInstall=false;render()">✕</button></div>`:(state.deferredPrompt&&state.showInstall?`<div class="install-banner"><img src="${LOGO}" style="width:36px;height:36px;object-fit:contain"><div style="flex:1"><div style="font-size:14px;font-weight:800;color:var(--amber-lt)">INSTALL APP</div></div><button onclick="state.deferredPrompt.prompt();state.deferredPrompt.userChoice.then(()=>{state.deferredPrompt=null;state.showInstall=false;render();});" style="background:var(--amber);border:none;border-radius:3px;padding:6px 12px;color:#000;font-family:Barlow Condensed,sans-serif;font-weight:800;font-size:12px;cursor:pointer">INSTALL</button><button class="install-close" onclick="state.showInstall=false;render()">✕</button></div>`:’’);
switch(state.tab){case ‘dash’:main=banner+renderDash();break;case ‘roof’:main=renderRoof();break;case ‘trail’:main=renderTrail();break;case ‘radar’:main=renderRadar();break;case ‘forecast’:main=renderForecast();break;}
}
app.innerHTML=`<div class="app"><div class="hdr"><div class="hdr-row"><div class="logo-wrap"><img src="${LOGO}" class="logo-img"><div><div class="logo-name">Weather Wrangler</div><div class="logo-sub">JEEP TRAIL WEATHER INTEL</div></div></div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px"><div class="spill"><span class="live-dot"></span>LIVE</div><div class="mono clock" style="color:var(--text-dim);font-size:10px">${fmt12(state.time)}</div></div></div></div><div class="content">${state.located&&!state.loading&&w?searchBarHTML():''  }${main}<div class="mono" style="text-align:center;margin-top:16px;color:var(--text-dim);font-size:9px;letter-spacing:2px;padding-bottom:8px">WEATHER WRANGLER · ${w?w.name.toUpperCase():''} · WEATHER.GOV</div></div><nav class="nav">${tabs.map(([v,icon,label])=>`<button class="nav-btn${state.tab===v?' active':''}" onclick="setTab('${v}')"><span class="nav-icon">${icon}</span>${label}</button>`).join('')}</nav></div>`;

if(!state.loading&&w){requestAnimationFrame(()=>{const mapIds={dash:[‘m-dash’,true],radar:[‘m-radar’,false]};const[mapId,compact]=mapIds[state.tab]||[];if(mapId){initLeafletMap(mapId,state.loc.lat,state.loc.lon,compact);startRadar(mapId+’-r’);}});}
}

render();
</script>

</body>
</html>
